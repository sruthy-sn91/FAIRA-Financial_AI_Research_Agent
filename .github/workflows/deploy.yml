name: Test & Deploy

# Trigger on every push to main, and on pull requests targeting main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Run Tests ────────────────────────────────────────────────────────
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"           # cache pip downloads between runs

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          # Provide dummy keys for unit tests (tools are mocked, no real calls)
          FRED_API_KEY: test_key
          E2B_API_KEY:  test_key
          GROQ_API_KEY: test_key
          LLM_PROVIDER: groq
          CHROMA_PATH:  ./data/chroma
          FILINGS_PATH: ./data/filings
        run: |
          pytest tests/ -v --tb=short

  # ── Job 2: Deploy to EC2 ────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test                  # only runs if the test job passed
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          timeout:  300s
          script: |
            set -e   # exit immediately if any command fails

            echo "=== Pulling latest code ==="
            cd /opt/financial-agent
            git pull origin main

            echo "=== Writing production .env ==="
            # Write secrets from GitHub to the server's .env file
            # (the server never stores secrets in git)
            cat > .env.production << EOF
            LLM_PROVIDER=groq
            GROQ_MODEL=llama-3.3-70b-versatile
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            FRED_API_KEY=${{ secrets.FRED_API_KEY }}
            E2B_API_KEY=${{ secrets.E2B_API_KEY }}
            CHROMA_PATH=/opt/financial-agent/data/chroma
            FILINGS_PATH=/opt/financial-agent/data/filings
            MLFLOW_TRACKING_URI=/opt/financial-agent/mlflow_runs
            API_BASE_URL=http://localhost:8000
            EOF

            echo "=== Rebuilding changed containers ==="
            docker compose -f docker-compose.yml \
              --env-file .env.production \
              build --no-cache api ui

            echo "=== Restarting services ==="
            docker compose -f docker-compose.yml \
              --env-file .env.production \
              up -d --remove-orphans

            echo "=== Waiting for services to start ==="
            sleep 10

            echo "=== Health check ==="
            curl --fail --silent http://localhost:8000/health \
              && echo "API is healthy" \
              || (echo "API health check failed" && exit 1)

            echo "=== Deployment complete ==="
            docker compose ps
