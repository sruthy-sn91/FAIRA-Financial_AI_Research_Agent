# nginx reverse proxy — containerised deployment
# Upstream names match the Docker Compose service names defined in docker-compose.yml.
# Mount this file with:
#   volumes:
#     - ./nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro

server {
    listen 80;
    server_name _;

    # ── Streamlit UI ────────────────────────────────────────────────────────
    # Streamlit uses WebSockets for its live-update protocol.
    # proxy_http_version 1.1 + the Upgrade/Connection headers are required.
    location / {
        proxy_pass         http://ui:8501;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── FastAPI Backend ─────────────────────────────────────────────────────
    # proxy_buffering off is critical for SSE streaming: nginx must forward
    # each token event to the browser immediately, not hold it in a buffer.
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass         http://api:8000;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        add_header         X-Accel-Buffering no;
    }

    # ── MLflow Tracking UI ──────────────────────────────────────────────────
    location /mlflow/ {
        rewrite ^/mlflow/(.*) /$1 break;
        proxy_pass       http://mlflow:5000;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Health probe (load balancers / uptime monitors) ─────────────────────
    location /health {
        proxy_pass http://api:8000/health;
    }
}
